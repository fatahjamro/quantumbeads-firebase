name: Publish Approved LinkedIn Post
on:
  issue_comment:
    types: [created] # Triggers whenever a new comment is added to an issue

jobs:
  publish_to_linkedin:
    # Only run if the comment is exactly "Approve" and the issue has the "linkedin-draft" label
    if: github.event.comment.body == 'Approve' && contains(github.event.issue.labels.*.name, 'linkedin-draft')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run publishing script
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python publish_post.py