name: Publish Approved Post (Tuesday Queue)

on:
  schedule:
    # Wakes up at 08:00 UTC every Tuesday (09:00 Galway time)
    - cron: '0 8 * * 2'
  workflow_dispatch: # Keeps the manual run button for testing

jobs:
  publish_to_linkedin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run the Publisher Engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
        run: python publish_post.py